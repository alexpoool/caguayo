services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: caguayo-backend:latest
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-caguayo}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-caguayo}
      - PYTHONPATH=/app/backend/src
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env file}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - caguayo-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    image: caguayo-frontend:latest
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - caguayo-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-caguayo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      - POSTGRES_DB=${POSTGRES_DB:-caguayo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caguayo} -d ${POSTGRES_DB:-caguayo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - caguayo-network

volumes:
  postgres_data:

networks:
  caguayo-network:
    driver: bridge
