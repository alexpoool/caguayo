# ── ty type checker configuration ─────────────────────────────────────────
# ty is an extremely fast Python type checker by Astral (ruf/uv team)
# Quality pipeline: blocks build on critical errors, warns on all others.

[environment]
python = "backend/.venv"
python-version = "3.13"

[rules]
# ── CRITICAL: these block the build (exit code 1) ──────────────────────
# Real bugs that could crash at runtime
unresolved-import = "error"
unresolved-reference = "error"
invalid-context-manager = "error"

# ── WARNINGS: visible but don't block the build ────────────────────────
# Return type issues — many legacy services return None
invalid-return-type = "warn"

# Parameter defaults — legacy code uses `str = None` instead of Optional[str]
invalid-parameter-default = "warn"

# Method overrides — Liskov violations in legacy generics
invalid-method-override = "warn"

# SQLAlchemy / SQLModel dynamic attribute patterns
invalid-argument-type = "warn"
unresolved-attribute = "warn"
no-matching-overload = "warn"
unsupported-operator = "warn"
not-subscriptable = "warn"
not-iterable = "warn"
invalid-assignment = "warn"
unknown-argument = "warn"
